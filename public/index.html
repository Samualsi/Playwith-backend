<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Live TV Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
            color: white;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            cursor: pointer;
        }

        #start-btn {
            padding: 20px 50px;
            font-size: 24px;
            color: white;
            background: #e50914;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        #player-wrapper {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: none;
        }

        #vjs-player-container,
        #yt-player-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .video-js,
        #yt-iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }

        /* Audio Poster Layer */
        #audio-poster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: none;
            z-index: 5;
        }

        /* TV Overlay */
        #channel-info {
            position: absolute;
            top: 50px;
            left: 50px;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 40px;
            border-radius: 4px;
            font-size: 32px;
            font-weight: bold;
            display: none;
            z-index: 160;
            border-left: 8px solid #e50914;
            transition: opacity 0.5s;
        }
    </style>
</head>

<body>
    <div id="overlay" onclick="startApp()">
        <button id="start-btn">WATCH LIVE</button>
        <p style="color: #888; margin-top: 15px;">Use Remote Arrows to change channels</p>
    </div>

    <div id="player-wrapper">
        <div id="channel-info">Channel Name</div>
        <div id="audio-poster"></div>
        <div id="vjs-player-container">
            <video id="main-player" class="video-js vjs-default-skin" preload="auto" playsinline></video>
        </div>
        <div id="yt-player-container">
            <iframe id="yt-iframe" allow="autoplay; fullscreen" referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen></iframe>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        let channels = [];
        let currentIndex = 0;
        let infoTimer;
        const player = videojs('main-player');

        async function startApp() {
            const res = await fetch('/api/channels');
            channels = await res.json();
            if (channels.length === 0) return alert("No channels in database!");

            document.getElementById('overlay').style.display = 'none';
            document.getElementById('player-wrapper').style.display = 'block';
            changeChannel(0);
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        }

        function changeChannel(index) {
            if (index >= channels.length) index = 0;
            if (index < 0) index = channels.length - 1;
            currentIndex = index;

            const chan = channels[currentIndex];
            const info = document.getElementById('channel-info');
            const poster = document.getElementById('audio-poster');
            const vjsCont = document.getElementById('vjs-player-container');
            const ytCont = document.getElementById('yt-player-container');

            info.innerText = (currentIndex + 1) + ". " + chan.name;
            info.style.display = 'block';
            info.style.opacity = '1';

            // Reset
            poster.style.display = 'none';
            ytCont.style.display = 'none';
            vjsCont.style.display = 'none';
            document.getElementById('yt-iframe').src = "";

            if (chan.type === 'hls' || chan.type === 'audio') {
                vjsCont.style.display = 'block';
                if (chan.type === 'audio' && chan.poster) {
                    poster.style.backgroundImage = `url('${chan.poster}')`;
                    poster.style.display = 'block';
                }
                player.src({ src: chan.src, type: chan.type === 'audio' ? 'audio/mpeg' : 'application/x-mpegURL' });
                player.play();
            } else {
                player.pause();
                ytCont.style.display = 'block';
                document.getElementById('yt-iframe').src = `https://www.youtube-nocookie.com/embed/${chan.id}?autoplay=1&mute=0&controls=0`;
            }

            clearTimeout(infoTimer);
            infoTimer = setTimeout(() => { info.style.opacity = '0'; }, 3000);
        }

        window.addEventListener('keydown', (e) => {
            if ([38, 33, 37, 427].includes(e.keyCode)) changeChannel(currentIndex - 1);
            if ([40, 34, 39, 428].includes(e.keyCode)) changeChannel(currentIndex + 1);
        });
    </script>
</body>

</html>
